    <text x="200" y="153" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#134e4a">mobil / liten yta</text>
    <text x="200" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#134e4a">srcset valde liten fil</text>
