<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="780" viewBox="0 0 1200 780" role="img" aria-labelledby="title desc">
    <title id="title">Responsiv bild 1200w</title>
    <desc id="desc">En enkel testbild som visar att 1200w-versionen har laddats.</desc>
    <rect width="1200" height="780" fill="#7c3aed"/>
    <rect x="72" y="72" width="1056" height="636" rx="40" fill="#ede9fe" opacity="0.93"/>
    <text x="600" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="126" font-weight="700" fill="#4c1d95">1200w</text>
    <text x="600" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="60" fill="#4c1d95">stor yta / tät skärm</text>
    <text x="600" y="568" text-anchor="middle" font-family="Arial, sans-serif" font-size="44" fill="#4c1d95">srcset valde stor fil</text>
</svg>
