<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lösningsförslag 5.5</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/main.js" defer></script>
</head>
<body>
  <main class="faq">
    <h1>Vanliga frågor</h1>

    <!-- Varje fråga består av en riktig knapp och ett svar som knappen styr. -->
    <section class="faq-item">
      <h2><button class="faq-button" type="button" aria-expanded="false" aria-controls="answer-html">Vad gör HTML?</button></h2>
      <div class="faq-answer" id="answer-html"><p>HTML beskriver sidans innehåll och struktur.</p></div>
    </section>

    <section class="faq-item">
      <h2><button class="faq-button" type="button" aria-expanded="false" aria-controls="answer-css">Vad gör CSS?</button></h2>
      <div class="faq-answer" id="answer-css"><p>CSS styr sidans utseende och layout.</p></div>
    </section>

    <section class="faq-item">
      <h2><button class="faq-button" type="button" aria-expanded="false" aria-controls="answer-js">Vad gör JavaScript?</button></h2>
      <div class="faq-answer" id="answer-js"><p>JavaScript kan ge sidan beteende och interaktion.</p></div>
    </section>
  </main>
</body>
</html>
